---
# Deploy pi-a2a-communication to fleet nodes
#
# Usage:
#   ansible-playbook -i inventory.ini deploy-a2a.yml              # Full deploy
#   ansible-playbook -i inventory.ini deploy-a2a.yml --tags config  # Config only
#   ansible-playbook -i inventory.ini deploy-a2a.yml --tags restart # Restart only
#
# What this does:
#   1. Pulls latest pi-a2a-communication from GitHub
#   2. Builds dist (npm install + npm run build)
#   3. Runs 'pi update' to register extension
#   4. Updates A2A config (bridge type, auth token, version)
#   5. Updates agent card versions
#   6. Restarts pi-agent service
#   7. Verifies A2A server is responding
#
# Prerequisites:
#   - SSH key access to fleet nodes
#   - Node.js installed via nvm on each node
#   - pi installed globally via nvm
#   - pi-agent@<node>.service configured in systemd
#
# Deploy options:
#   ansible-playbook -i inventory.ini deploy-a2a.yml              # Full deploy
#   ansible-playbook -i inventory.ini deploy-a2a.yml --tags build  # Build only
#   ansible-playbook -i inventory.ini deploy-a2a.yml --tags config # Config only
#   ansible-playbook -i inventory.ini deploy-a2a.yml --tags restart # Restart only

- name: Deploy A2A Communication Extension to Fleet
  hosts: lab_nodes
  gather_facts: yes
  strategy: linear
  # Run code/build/config tasks as the SSH user (friasc) by default: the repo, nvm, and
  # ~/.pi config all live in /home/<ansible_user>. Only the systemd restart below sets
  # become: yes (root) to manage the system unit. NOTE: the inventory sets ansible_become=true
  # group-var, so we override it with a PLAY VAR here (a play-level `become: false` keyword
  # does NOT override an inventory ansible_become var). The restart task's `become: yes`
  # keyword (task-level) outranks this var -> root for restart only.

  vars:
    # Override the inventory ansible_become=true group-var so code/build/config tasks run
    # as the SSH user (friasc). The restart task re-enables become via its `become: yes` keyword.
    ansible_become: false
    # Source paths — become-independent (use ansible_user, NOT ansible_env.HOME which
    # flips to /root under become=true). Resolves to /home/friasc/... regardless of become.
    a2a_repo: "/home/{{ ansible_user }}/.pi/agent/git/github.com/carlosfrias/pi-a2a-communication"
    a2a_config_dir: "/home/{{ ansible_user }}/.pi/agent/a2a"

    # Bridge configuration (v0.5.5 fleet reality — subprocess bridge w/ opt-in flags).
    # The spawned `pi --print` child sets PI_A2A_SKIP_SERVER=1 (see SubprocessPiTaskBridge)
    # so it does NOT re-bind port 10000 vs the running tmux pi-agent — fleet can use
    # 'subprocess' safely. Opt-in flags pin provider/model to bypass the model-router's
    # cloud-via-a2a cross-node loop, drop extensions to avoid --print stdout interference,
    # and cap concurrency/buffer for CPU/RAM-constrained nodes.
    bridge_type: "subprocess"
    bridge_command: "/usr/local/bin/pi"
    bridge_timeout: 300000
    bridge_provider: "ollama"
    bridge_model: "qwen3.5:4b"
    bridge_tools: "bash,read,edit"
    bridge_noExtensions: true
    bridge_maxConcurrent: 2
    bridge_maxBufferBytes: 10485760
    # Phase EXEC Tier A — executor-role steering (default fleet-executor system prompt).
    # Forces the weak local model to actually invoke tools + paste real stdout instead
    # of narrating command plans. Override per-node in config.json to customize or empty-disable.
    # Phase EXEC Tier A — executor-role steering. Tightened 2026-07-04 to suppress the
    # prose/code-fence wrappers some 4B nodes emitted ("The answer is **391**", fenced
    # command+output). The Tier D agent-exec path uses its own agentExecSystemPrompt.
    bridge_systemPrompt: "You are a fleet execution agent. Complete the assigned task by invoking the available tools (bash, read, edit). Never describe commands in prose — actually execute them and paste the real stdout. Paste ONLY the raw result — no prose, no code fences, no re-statement of the command, no commentary such as 'The answer is'. A response that only describes or plans commands, without real tool output, is a failure. If a step cannot be completed, report the actual error only."
    bridge_appendSystemPrompt: ""
    # Phase EXEC Tier B — narration-detection guard. If the model narrates
    # commands instead of executing them, re-run once with a forced execute-and-
    # paste-stdout follow-up. Opt-in; default on for the fleet.
    bridge_narrationGuardEnabled: true
    bridge_narrationMaxRetries: 1
    # Phase EXEC Tier D — agent-exec strong-model escalation. Re-enabled on 32GB
    # nodes (where qwen3.5:35b-a3b fits) with the keep-alive mitigation: the
    # agent-exec subprocess sets OLLAMA_KEEP_ALIVE={{ bridge_agentExecKeepAlive }}
    # so the 35B model loads ONCE and stays resident across a multi-step agent loop
    # (avoids the per-turn 23GB reload churn that OOMed 32GB nodes under the fleet
    # default OLLAMA_KEEP_ALIVE=0; verified 2026-07-03). On 16GB nodes the handler
    # is registered with enabled=false -> agent-exec tasks fail explicitly.
    bridge_agentExecEnabled: "{{ (ansible_memtotal_mb | default(0) | int) >= 30000 }}"
    bridge_agentExecModel: "qwen3.5:35b-a3b"
    bridge_agentExecTimeout: 600000
    bridge_agentExecKeepAlive: "10m"
    # Phase EXEC Option B — OLLAMA_KEEP_ALIVE for the REGULAR subprocess bridge.
    # Without this, OLLAMA_KEEP_ALIVE defaults to 0 (unload after each request), causing
    # ~89s cold starts and "Connection error" failures on every new task.
    # The pi wrapper at /usr/local/bin/pi sets this env var; the config value is the fallback.
    bridge_ollamaKeepAlive: "10m"
    # Phase EXEC Tier D — dedicated capable-agent prompt for the strong model (the
    # Tier A fleet-executor prompt is tuned for the weak 4B; this one lets the 35B
    # plan / self-check / verify across multi-step agentic work).
    bridge_agentExecSystemPrompt: "You are a capable fleet execution agent working on a remote node. Complete the assigned task by invoking the available tools (bash, read, edit) as many times as needed: plan briefly, execute, observe the real output, and verify. For multi-step work, reason concisely between steps and confirm the result. Paste real command output; never describe a command without executing it. A plan-only or description-only response is a failure."

    # A2A auth token
    bearer_token: "lab-fleet-2026"

    # Service name pattern
    service_name: "pi-agent@{{ inventory_hostname }}"

    # A2A version to set in agent cards (matches package.json; bumped 0.5.5 -> 0.6.0 for Phase EXEC)
    a2a_version: "0.6.0"

    # Bridge type for fleet nodes:
    # 'subprocess' — spawns `pi --print --no-session` with opt-in flags + PI_A2A_SKIP_SERVER
    #   env gate so the child does not collide with the running tmux pi-agent (EADDRINUSE fix).
    # 'noop' — returns placeholder (legacy; not used on the v0.5.5 fleet).
    # Note: PiSessionTaskHandler is registered automatically but is NON-FUNCTIONAL on the
    # fleet (ctx.newSession is only on ExtensionCommandContext, not the a2a-server
    # ExtensionContext) -> always throws PI_SESSION_UNAVAILABLE -> falls back to this bridge.
    # Phase EXEC Tier A: bridge_systemPrompt steers the executor model to act, not narrate.

  # ── Phase 1: Update Code ─────────────────────────────────────────────
  tasks:
    - name: Assert ansible_memtotal_mb fact is available (agent-exec 32GB gating depends on it)
      ansible.builtin.assert:
        that:
          - ansible_memtotal_mb is defined
          - ansible_memtotal_mb | int > 0
        fail_msg: "ansible_memtotal_mb fact is missing/zero — the agent-exec 32GB gating (bridge_agentExecEnabled) would silently disable agent-exec on every node. Ensure gather_facts is enabled."
      tags: [deploy, config]

    - name: Check if A2A repo exists
      ansible.builtin.stat:
        path: "{{ a2a_repo }}"
      register: a2a_repo_exists
      tags: [deploy, code]

    - name: Handle existing A2A repo (stash + pre-clone checks)
      when: a2a_repo_exists.stat.exists
      block:
        - name: Stash any local changes in A2A repo
          ansible.builtin.shell: git stash 2>/dev/null || true
          args:
            chdir: "{{ a2a_repo }}"
          tags: [deploy, code]

    - name: Pull latest pi-a2a-communication
      ansible.builtin.git:
        repo: "https://github.com/carlosfrias/pi-a2a-communication.git"
        dest: "{{ a2a_repo }}"
        version: main
        force: yes
      tags: [deploy, code]

    - name: Build A2A extension (npm ci + build)
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        cd {{ a2a_repo }}
        npm ci --prefer-offline && npm run build
      args:
        chdir: "{{ a2a_repo }}"
        executable: /bin/bash
      tags: [deploy, code, build]

    - name: Verify built version
      ansible.builtin.shell: grep '"version"' package.json | head -1
      args:
        chdir: "{{ a2a_repo }}"
      register: built_version
      changed_when: false
      tags: [deploy, code]

    - name: Show built version
      ansible.builtin.debug:
        msg: "A2A version on {{ inventory_hostname }}: {{ built_version.stdout }}"
      tags: [deploy, code]

  # ── Phase 1.5: Deploy fleet health monitoring + boot guard ─────────
    - name: Deploy fleet health reporter and boot guard
      ansible.builtin.include_tasks: playbooks/deploy-fleet-health.yml
      tags: [deploy, health]

  # ── Phase 2: Remove conflicting npm package ──────────────────────────
    - name: Register A2A extension with pi
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        pi update git:github.com/carlosfrias/pi-a2a-communication 2>/dev/null || true
      args:
        executable: /bin/bash
      tags: [deploy, code, build]

    - name: Remove conflicting npm pi-a2a-communication
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        pi remove npm:pi-a2a-communication 2>/dev/null || true
      args:
        executable: /bin/bash
      tags: [deploy]

  # ── Phase 3: Update Configuration ────────────────────────────────────
    - name: Create A2A config directory
      ansible.builtin.file:
        path: "{{ a2a_config_dir }}"
        state: directory
        mode: '0755'
      tags: [deploy, config]

    - name: Write A2A config.json
      ansible.builtin.copy:
        dest: "{{ a2a_config_dir }}/config.json"
        mode: '0644'
        content: |
          {
            "server": {
              "enabled": true,
              "port": 10000,
              "host": "0.0.0.0",
              "basePath": "/"
            },
            "security": {
              "defaultScheme": "bearer",
              "bearerToken": "{{ bearer_token }}",
              "verifySsl": false
            },
            "client": {
              "timeout": 30000,
              "retryAttempts": 3,
              "retryDelay": 1000,
              "maxConcurrentTasks": 10,
              "streamingEnabled": true
            },
            "discovery": {
              "cacheEnabled": true,
              "cacheTtl": 300000,
              "agentCardPath": "/.well-known/agent-card.json",
              "timeout": 10000
            },
            "bridge": {
              "type": {{ bridge_type | to_json }},
              "command": {{ bridge_command | to_json }},
              "timeout": {{ bridge_timeout }},
              "provider": {{ bridge_provider | to_json }},
              "model": {{ bridge_model | to_json }},
              "tools": {{ bridge_tools | to_json }},
              "noExtensions": {{ bridge_noExtensions | to_json }},
              "maxConcurrent": {{ bridge_maxConcurrent }},
              "maxBufferBytes": {{ bridge_maxBufferBytes }},
              "systemPrompt": {{ bridge_systemPrompt | to_json }},
              "appendSystemPrompt": {{ bridge_appendSystemPrompt | to_json }},
              "narrationGuardEnabled": {{ bridge_narrationGuardEnabled | to_json }},
              "narrationMaxRetries": {{ bridge_narrationMaxRetries | to_json }},
              "agentExecEnabled": {{ bridge_agentExecEnabled | to_json }},
              "agentExecModel": {{ bridge_agentExecModel | to_json }},
              "agentExecTimeout": {{ bridge_agentExecTimeout | to_json }},
              "agentExecSystemPrompt": {{ bridge_agentExecSystemPrompt | to_json }},
              "agentExecKeepAlive": {{ bridge_agentExecKeepAlive | to_json }},
              "ollamaKeepAlive": {{ bridge_ollamaKeepAlive | to_json }}
            }
          }
      tags: [deploy, config]

    - name: Ensure agents directory exists for version update
      ansible.builtin.file:
        path: "{{ a2a_config_dir }}/agents"
        state: directory
        mode: '0755'
      tags: [deploy, config]

    - name: Find agent card files
      ansible.builtin.find:
        paths: "{{ a2a_config_dir }}/agents"
        patterns: ['*.json']
      register: agent_card_files
      tags: [deploy, config]

    - name: Update agent card versions
      ansible.builtin.shell: |
        sed -i 's/"version": "0\.2\.0-alpha\.[0-9]*"/"version": "{{ a2a_version }}"/g' "{{ item.path }}"
        sed -i 's/"version": "0\.2\.0"/"version": "{{ a2a_version }}"/g' "{{ item.path }}"
      loop: "{{ agent_card_files.files }}"
      when: agent_card_files.files | length > 0
      tags: [deploy, config]

  # ── Phase 3.5: Self-healing — Ensure pi is accessible from root context ──
    - name: Find pi binary via nvm
      ansible.builtin.shell: |
        export NVM_DIR="/home/{{ ansible_user }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        which pi
      args:
        executable: /bin/bash
      register: pi_nvm_path
      changed_when: false
      tags: [deploy, config]

    - name: Create /usr/local/bin/pi wrapper (self-healing PATH fix)
      ansible.builtin.copy:
        dest: "/usr/local/bin/pi"
        mode: '0755'
        content: |
          #!/bin/bash
          # pi-wrapper — Ensures pi is accessible regardless of user or PATH.
          # Sources nvm so the pi binary (Node.js script) can find node.
          # Used by the A2A bridge subprocess which may run as root without nvm.
          # Self-healing: created by deploy-a2a.yml, verified by fleet-a2a-remediate.yml
          export NVM_DIR="/home/{{ ansible_user }}/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          export OLLAMA_KEEP_ALIVE="${OLLAMA_KEEP_ALIVE:-10m}"
          exec pi "$@"
      # Task var overrides the play var ansible_become=false (task var > play var > keyword).
      vars:
        ansible_become: true
      tags: [deploy, config]

    - name: Verify pi wrapper works
      ansible.builtin.command: /usr/local/bin/pi --version
      register: pi_wrapper_verify
      changed_when: false
      tags: [deploy, config]

    - name: Ensure fleet-scripts directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/fleet-scripts"
        state: directory
        mode: '0755'
      # Task var overrides the play var ansible_become=false (task var > play var > keyword).
      vars:
        ansible_become: true
      tags: [deploy, config]

    - name: Install pi-agent-standalone.sh from active repo
      ansible.builtin.copy:
        src: "{{ playbook_dir | dirname }}/scripts/pi-agent-standalone.sh"
        dest: "/home/{{ ansible_user }}/fleet-scripts/pi-agent-standalone.sh"
        mode: '0755'
      # Task var overrides the play var ansible_become=false.
      vars:
        ansible_become: true
      tags: [deploy, config]

    - name: Install pi-agent systemd unit template from active repo
      ansible.builtin.template:
        src: "{{ playbook_dir }}/systemd/pi-agent@.service.template"
        dest: "/etc/systemd/system/pi-agent@.service"
        mode: '0644'
      # Task var overrides the play var ansible_become=false.
      vars:
        ansible_become: true
      register: unit_installed
      tags: [deploy, config]

    - name: Remove stale per-hostname pi-agent unit files
      ansible.builtin.shell: |
        find /etc/systemd/system -maxdepth 1 -type f -name 'pi-agent@*.service' ! -name 'pi-agent@.service' -delete
      args:
        executable: /bin/bash
      changed_when: true
      # Task var overrides the play var ansible_become=false.
      vars:
        ansible_become: true
      tags: [deploy, config]

    - name: Reload systemd after unit install
      ansible.builtin.systemd:
        daemon_reload: yes
      # Task var overrides the play var ansible_become=false.
      vars:
        ansible_become: true
      tags: [deploy, config]

    - name: Show self-healing results
      ansible.builtin.debug:
        msg:
          - "pi wrapper: /usr/local/bin/pi → {{ pi_nvm_path.stdout }}"
          - "pi --version: {{ pi_wrapper_verify.stdout_lines[:1] }}"
          - "pi-agent unit installed from active repo: {{ unit_installed.dest | default('?') }}"
      tags: [deploy, config]

  # ── Phase 4: Enable and Restart Service ──────────────────────────────
    # NOTE: state=stopped only in shutdown playbooks — never use enabled=no on pi-agent.
    # The unit must remain enabled so the agent starts automatically after reboot.
    - name: Ensure pi-agent service is enabled
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        enabled: yes
      # Task var overrides the play var ansible_become=false.
      vars:
        ansible_become: true
      tags: [deploy, restart]

    - name: "Restart pi-agent service (--no-block: does not wait for slow activation; the wait_for task below checks readiness)"
      ansible.builtin.shell: systemctl restart --no-block {{ service_name }}
      # Task var overrides the play var ansible_become=false.
      vars:
        ansible_become: true
      changed_when: true
      tags: [deploy, restart]

    - name: Wait for A2A server to respond
      ansible.builtin.wait_for:
        port: 10000
        host: "127.0.0.1"
        delay: 10
        timeout: 60
      tags: [deploy, restart]

  # ── Phase 5: Verify ──────────────────────────────────────────────────
    - name: Verify A2A server responds
      ansible.builtin.uri:
        url: "http://localhost:10000/.well-known/agent-card.json"
        method: GET
        headers:
          Authorization: "Bearer {{ bearer_token }}"
        return_content: yes
      register: agent_card
      retries: 5
      delay: 5
      tags: [deploy, verify]

    - name: Show agent card info
      ansible.builtin.debug:
        msg: "✅ {{ inventory_hostname }}: A2A v{{ agent_card.json.version }} — {{ agent_card.json.name }}"
      tags: [deploy, verify]

  # ── Summary ──────────────────────────────────────────────────────────
  post_tasks:
    - name: Fleet deploy summary
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════"
          - "  A2A COMMUNICATION v{{ a2a_version }} DEPLOYED"
          - "═══════════════════════════════════════════════════"
          - "  All fnet1-7 A2A servers running with bridge={{ bridge_type }}"
          - "  Auth: Bearer token configured"
          - "  Port: 10000"
          - ""
          - "  Test: curl -H 'Authorization: Bearer {{ bearer_token }}' \\"
          - "          http://<node>:10000/.well-known/agent-card.json"
          - "═══════════════════════════════════════════════════"